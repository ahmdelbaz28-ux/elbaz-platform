# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Elbaz LMS — Docker Compose (Production)
#  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Usage:
#    1) Copy .env.example to .env and fill in real values
#    2) docker compose up -d
#
#  Includes: MySQL 8, Redis, Node.js App, Nginx reverse-proxy
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:

  # ─── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: elbaz-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?ERROR-Set-DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-elbaz_platform}
      MYSQL_USER: ${DB_USER:-elbaz}
      MYSQL_PASSWORD: ${DB_PASSWORD:?ERROR-Set-DB_PASSWORD}
    # ✅ SECURITY: MySQL port NOT exposed to the internet (only accessible within Docker network)
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Rate Limiting) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: elbaz-redis
    restart: unless-stopped
    # ✅ SECURITY: Redis port NOT exposed to the internet (only accessible within Docker network)
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application (Backend + Frontend) ───────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elbaz-app
    restart: unless-stopped
    env_file:
      - .env
    # ✅ SECURITY: App port NOT exposed — all traffic goes through Nginx
    # Only uncomment for debugging: ports: - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://${DB_USER:-elbaz}:${DB_PASSWORD}@db:3306/${DB_NAME:-elbaz_platform}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ─── Nginx (Reverse Proxy + SSL) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: elbaz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
