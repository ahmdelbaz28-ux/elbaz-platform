# One-time workflow: Update HF Space secret (OPENROUTER_API_KEY)
# Run manually via workflow_dispatch, then DELETE this file
name: Update HF Secret

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Secret name to update on HF Space'
        required: true
        default: 'OPENROUTER_API_KEY'
      secret_value:
        description: 'New secret value'
        required: true

jobs:
  update-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Update HF Space Secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SECRET_NAME: ${{ github.event.inputs.secret_name }}
          SECRET_VALUE: ${{ github.event.inputs.secret_value }}
        run: |
          pip install huggingface_hub --quiet
          python3 << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          secret_name = os.environ["SECRET_NAME"]
          secret_value = os.environ["SECRET_VALUE"]

          # Update the secret on the HF Space
          api.add_space_secret(
              repo_id="ahmdelbaz28/AHMDRTAP",
              key=secret_name,
              value=secret_value,
          )
          print(f"Successfully updated secret '{secret_name}' on HF Space ahmdelbaz28/AHMDRTAP")
          PYEOF
