# Deploy to HuggingFace Spaces on push to main
# Uses git push with LFS to handle binary files
name: Deploy to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════════════════════
  # GATE: Run tests BEFORE deploying — prevent broken code from reaching production
  # 84 unit tests covering: JWT, Password, RateLimiter, Cache, Chatbot
  # CRITICAL: If tests fail, deployment MUST be blocked. No continue-on-error.
  # ══════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Update lockfile (if needed)
        run: |
          if ! npm ci --dry-run 2>/dev/null; then
            npm install --package-lock-only --no-audit --no-fund
          fi

      - name: Run unit tests
        env:
          NODE_ENV: test
          APP_SECRET: test-secret-not-for-production-minimum-32-chars
          OPENROUTER_API_KEY: sk-or-v1-test-key-for-ci-only
          DATABASE_URL: mysql2://test:test@localhost:3306/test
        run: npx vitest run --reporter=verbose

  # ══════════════════════════════════════════════════════════
  # DEPLOY: Only runs if tests pass (needs: test = hard gate)
  # If ANY test fails, this job will NOT run — broken code stays out
  # ══════════════════════════════════════════════════════════
  deploy:
    needs: test
    if: success()    # Extra safety: only deploy if test job succeeded
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.png" "*.jpg" "*.webp" "*.jpeg" "*.gif" "*.svg" "*.ico" "*.jar" "*.properties"

      - name: Configure Git for HF
        run: |
          git remote add hf-space https://ahmdelbaz28:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/ahmdelbaz28/AHMDRTAP.git
          git config user.email "ahmdelbaz28@users.noreply.github.com"
          git config user.name "ahmdelbaz28-ux"

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          git push hf-space main --force
          echo "Deploy complete! SHA: ${SHA}"

      - name: Deployment Status
        if: always()
        run: echo "Deployment completed. Check https://huggingface.co/spaces/ahmdelbaz28/AHMDRTAP for build status."
