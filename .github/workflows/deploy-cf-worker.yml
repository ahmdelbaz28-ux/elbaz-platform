# ════════════════════════════════════════════════════════════════════════════
# Deploy Cloudflare Worker (alternative to broken Workers Builds)
# ════════════════════════════════════════════════════════════════════════════
# WHY THIS EXISTS:
#   The Workers Build in the Cloudflare dashboard keeps failing at the
#   "Deploying" step because `npx wrangler versions upload` needs a
#   wrangler.toml in the repo. This workflow uses `wrangler deploy` directly,
#   which is more reliable and gives us full control over the deploy.
#
# HOW TO USE:
#   1. GitHub Secrets `CLOUDFLARE_API_TOKEN` and `CLOUDFLARE_ACCOUNT_ID`
#      are already configured in this repo.
#   2. Push to main. The Worker will deploy automatically when the
#      Worker source code or wrangler.toml changes.
#   3. You can also trigger this workflow manually via the Actions tab.
#
# DISABLE THE BROKEN WORKERS BUILD:
#   Workers & Pages → ahmedelbaz → Settings → Build → Remove
#   (Once removed, this workflow is the only deploy path.)
# ════════════════════════════════════════════════════════════════════════════
name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'infra/security-audit/worker-v7-hardened.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cf-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Deploying Worker 'ahmedelbaz' to account ${CLOUDFLARE_ACCOUNT_ID} ==="
          wrangler deploy \
            --name ahmedelbaz \
            --compatibility-date 2025-09-23 \
            infra/security-audit/worker-v7-hardened.js

      - name: Verify deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          sleep 5
          # Test worker.dev endpoint
          WORKER_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0" \
            https://ahmedelbaz.ahmdelbaz28.workers.dev)
          echo "Worker.dev returned HTTP $WORKER_STATUS"

          # Test custom domain
          DOMAIN_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0" \
            https://ahmedelbaz.qzz.io)
          echo "Custom domain returned HTTP $DOMAIN_STATUS"

          if [ "$WORKER_STATUS" = "200" ] || [ "$WORKER_STATUS" = "302" ] || [ "$WORKER_STATUS" = "404" ]; then
            echo "✅ Worker is responding correctly"
          else
            echo "⚠️ Worker returned unexpected status ($WORKER_STATUS), check logs"
            exit 1
          fi
