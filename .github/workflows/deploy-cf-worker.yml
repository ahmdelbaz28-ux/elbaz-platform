# ════════════════════════════════════════════════════════════════════════════
# Deploy Cloudflare Worker (alternative to broken Workers Builds)
# ════════════════════════════════════════════════════════════════════════════
# WHY THIS EXISTS:
#   The Workers Build in the Cloudflare dashboard keeps failing at the
#   "Deploying" step because `npx wrangler versions upload` needs a
#   wrangler.toml in the repo. This workflow uses `wrangler deploy` directly,
#   which is more reliable and gives us full control over the deploy.
#
# HOW TO USE:
#   1. Create a GitHub Secret named `CLOUDFLARE_API_TOKEN` with a Cloudflare
#      API Token that has permission to edit Workers in account
#      fd43879d968b0358dc82ab3be03fd970.
#      (Dashboard → My Profile → API Tokens → Create Token →
#       "Edit Cloudflare Workers" template)
#   2. Push to main. The Worker will deploy automatically.
#   3. Disable the broken Workers Build in Cloudflare dashboard:
#      Workers & Pages → ahmedelbaz → Settings → Build → Remove
# ════════════════════════════════════════════════════════════════════════════
name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'infra/security-audit/worker-v7-hardened.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-cf-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fd43879d968b0358dc82ab3be03fd970
        run: |
          echo "=== Deploying Worker 'ahmedelbaz' ==="
          wrangler deploy \
            --name ahmedelbaz \
            --compatibility-date 2025-09-23 \
            infra/security-audit/worker-v7-hardened.js

      - name: Verify deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fd43879d968b0358dc82ab3be03fd970
        run: |
          sleep 5
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" https://ahmedelbaz.ahmdelbaz28.workers.dev)
          echo "Worker endpoint returned HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "404" ]; then
            echo "✅ Worker is responding"
          else
            echo "⚠️ Worker returned unexpected status, check logs"
          fi
