# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Elbaz LMS — Nginx Configuration (OPTIMIZED)
#  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Performance: Brotli + Gzip, static caching, keepalive
#  Security: HSTS, CSP, X-Frame-Options, rate limiting
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    accept_mutex off;                    # ✅ OPTIMIZED: distribute across workers
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging (reduced I/O) ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;                # ✅ OPTIMIZED: shorter keepalive for HF Spaces
    keepalive_requests 1000;
    client_max_body_size 20m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    output_buffers 2 32k;

    # ── File cache for open file descriptors ──
    open_file_cache max=2000 inactive=20s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;                   # ✅ OPTIMIZED: level 4 (good ratio, less CPU)
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ── Rate Limiting ──
    limit_req_status 429;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=120r/m;

    # ── Upstream ──
    upstream elbaz_app {
        server app:7860;
        keepalive 16;                    # ✅ OPTIMIZED: reduced from 32 to 16
    }

    # ── HTTP → HTTPS Redirect ──
    server {
        listen 80;
        server_name ahmedelbaz.qzz.io www.ahmedelbaz.qzz.io;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ──
    server {
        listen 443 ssl http2;
        server_name ahmedelbaz.qzz.io www.ahmedelbaz.qzz.io;

        # ── SSL Certificates ──
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── SSL Settings (Modern) ──
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;  # ✅ OPTIMIZED: reduced from 50m
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security Headers ──
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # ── CSP: Handled by the application (api/middleware/security.ts) ──
        # The app generates per-request nonces and sets the CSP dynamically.
        # Nginx cannot substitute nonces, so we DO NOT set CSP here.
        # Removing these prevents double/conflicting CSP headers.
        # Previously had literal '{NONCE}' which was never replaced.

        # ── Static Files (long cache for hashed assets) ──
        # NOTE: add_header in location blocks REPLACES all parent add_header directives.
        # We must re-add security headers in each location that uses add_header.
        location /assets/ {
            proxy_pass http://elbaz_app;
            expires 365d;
            add_header Cache-Control "public, immutable";
            # Re-add security headers (nginx drops parent headers when add_header is used)
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            access_log off;               # ✅ OPTIMIZED: no logging for static files
        }

        location ~* \.(js|css|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://elbaz_app;
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            access_log off;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://elbaz_app;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            access_log off;
        }

        # ── Health check (no logging, no rate limit) ──
        location /api/health {
            proxy_pass http://elbaz_app;
            access_log off;
        }

        # ── API Routes (rate limited) ──
        location /api/trpc/auth {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://elbaz_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://elbaz_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Paymob Webhook (no rate limit, IP-verified at app level) ──
        location /api/webhooks/paymob {
            proxy_pass http://elbaz_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── All other routes (SPA fallback) ──
        location / {
            limit_req zone=global burst=20 nodelay;
            proxy_pass http://elbaz_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
