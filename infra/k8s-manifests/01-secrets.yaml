apiVersion: v1
kind: Secret
metadata:
  name: ahmedelbaz-secrets
  namespace: ahmedelbaz
type: Opaque
stringData:
  # ⚠️  NEVER commit real secrets to git!
  # Use: kubectl create secret generic ahmedelbaz-secrets --from-literal=KEY=VALUE
  # Or use Sealed Secrets / Vault / SOPS for production
  DATABASE_URL: "CHANGE_ME_DATABASE_URL"
  APP_SECRET: "CHANGE_ME_APP_SECRET_MIN_32_CHARS"
  RESEND_API_KEY: "CHANGE_ME_RESEND_API_KEY"
  CLOUDFLARE_API_TOKEN: "CHANGE_ME_CF_API_TOKEN"
  R2_ACCESS_KEY: "CHANGE_ME_R2_ACCESS_KEY"
  R2_SECRET_KEY: "CHANGE_ME_R2_SECRET_KEY"
  SENTRY_DSN: "CHANGE_ME_SENTRY_DSN"
  CLARITY_ID: "CHANGE_ME_CLARITY_ID"
  ADMIN_EMAIL: "admin@ahmedelbaz.qzz.io"
