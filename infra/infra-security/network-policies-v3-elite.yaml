apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aiven-mysql-egress
  namespace: elbaz-platform
spec:
  podSelector:
    matchLabels:
      app: elbaz-api
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 28015
        - protocol: TCP
          port: 28016
        - protocol: TCP
          port: 10000
        - protocol: TCP
          port: 10001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: elbaz-platform
spec:
  podSelector:
    matchLabels:
      app: elbaz-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 3000
