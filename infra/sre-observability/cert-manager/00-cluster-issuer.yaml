apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ahmedelbaz.dev
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - "ahmedelbaz.dev"
            - "qzz.io"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@ahmedelbaz.dev
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
        selector:
          matchLabels:
            cert-manager.io/cluster-issuer: letsencrypt-staging
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ahmedelbaz-tls
  namespace: ahmedelbaz
spec:
  secretName: ahmedelbaz-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.ahmedelbaz.dev"
  dnsNames:
    - "ahmedelbaz.dev"
    - "*.ahmedelbaz.dev"
    - "lms.ahmedelbaz.dev"
    - "api.ahmedelbaz.dev"
    - "ahmedelbaz.qzz.io"
  privateKeyAlgorithm: ECDSA
  privateKeySize: 256
  renewBefore: 720h
  subject:
    organizations:
      - Elbaz Platform
  usages:
    - digital signature
    - key encipherment
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: "${CLOUDFLARE_API_TOKEN}"
