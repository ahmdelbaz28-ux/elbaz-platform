---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: dependency-failure-chaos
  namespace: ahmedelbaz
spec:
  appinfo:
    appns: ahmedelbaz
    applabel: "app=backend"
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: CHAOS_INTERVAL
              value: "30"
            - name: FORCE
              value: "false"
            - name: TARGET_PODS
              value: "redis-master-0"
            - name: APP_LABEL
              value: "app=redis"
            - name: APP_NS
              value: "ahmedelbaz"
