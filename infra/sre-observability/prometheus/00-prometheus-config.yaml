apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ahmedelbaz
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: ahmedelbaz
        monitor: prometheus

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - backend:3001

      - job_name: redis-exporter
        static_configs:
          - targets:
              - redis-exporter:9121

      - job_name: mysql-exporter
        static_configs:
          - targets:
              - mysql-exporter:9104

      - job_name: node-exporter
        static_configs:
          - targets:
              - node-exporter:9100

      - job_name: blackbox-exporter
        metrics_path: /probe
        params:
          module:
            - http_2xx
        static_configs:
          - targets:
              - https://lms.ahmedelbaz.dev/api/health
              - https://lms.ahmedelbaz.dev/api/v1/courses
              - https://lms.ahmedelbaz.dev/api/v1/auth/login
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115
