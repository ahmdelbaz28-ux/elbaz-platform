apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      manageAlerts: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
    uid: jaeger

  - name: MySQL
    type: mysql
    access: proxy
    url: mysql:3306
    database: lms_platform
    user: grafana
    editable: true
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 2
    secureJsonData:
      password: "${MYSQL_GRAFANA_PASSWORD}"
