apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: ahmedelbaz
  labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: smtp-relay:587
      smtp_from: alerts@ahmedelbaz.dev
      smtp_auth_username: alerts@ahmedelbaz.dev
      smtp_auth_password: "${SMTP_PASSWORD}"
      pagerduty_url: https://events.pagerduty.com/generic/2010-04-15/create_event.json

    templates:
      - /etc/alertmanager/templates/*.tmpl

    route:
      receiver: default
      group_by:
        - alertname
        - namespace
        - team
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: pagerduty-critical
          group_wait: 10s
          group_interval: 2m
          repeat_interval: 1h
          routes:
            - match:
                team: payments
              receiver: pagerduty-payments
              group_wait: 5s
              repeat_interval: 30m

        - match:
            severity: warning
          receiver: slack-warnings
          group_wait: 1m
          group_interval: 5m
          repeat_interval: 4h

        - match:
            severity: info
          receiver: email-info
          group_wait: 5m
          group_interval: 30m
          repeat_interval: 24h

    receivers:
      - name: default
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: #sre-alerts
            send_resolved: true
            title: "{{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

      - name: pagerduty-critical
        pagerduty_configs:
          - service_key: "${PAGERDUTY_SERVICE_KEY}"
            severity: critical
            description: "{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}"
            details:
              namespace: "{{ .GroupLabels.namespace }}"
              team: "{{ .GroupLabels.team }}"
              description: "{{ .CommonAnnotations.description }}"

      - name: pagerduty-payments
        pagerduty_configs:
          - service_key: "${PAGERDUTY_PAYMENTS_KEY}"
            severity: critical
            description: "PAYMENT: {{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}"
            details:
              namespace: "{{ .GroupLabels.namespace }}"
              description: "{{ .CommonAnnotations.description }}"

      - name: slack-warnings
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: #sre-warnings
            send_resolved: true
            title: "[WARNING] {{ .GroupLabels.alertname }}"
            color: warning
            text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

      - name: email-info
        email_configs:
          - to: sre-team@ahmedelbaz.dev
            send_resolved: true
            headers:
              Subject: "[INFO] {{ .GroupLabels.alertname }}"
            html: |
              <h2>{{ .GroupLabels.alertname }}</h2>
              {{ range .Alerts }}
              <p><strong>{{ .Annotations.summary }}</strong></p>
              <p>{{ .Annotations.description }}</p>
              <hr/>
              {{ end }}

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal:
          - alertname
          - namespace

      - source_match:
          severity: warning
        target_match:
          severity: info
        equal:
          - alertname
          - namespace

      - source_match:
          alertname: PodCrashLooping
        target_match:
          alertname: HighErrorRate
        equal:
          - namespace

      - source_match:
          alertname: DatabaseConnectionPoolExhausted
        target_match:
          alertname: HighLatencyP99
        equal:
          - namespace
