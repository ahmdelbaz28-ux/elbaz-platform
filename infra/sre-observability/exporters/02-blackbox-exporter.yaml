apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: ahmedelbaz
  labels:
    app: blackbox-exporter
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          valid_status_codes:
            - 200
            - 201
            - 204
            - 301
            - 302
          follow_redirects: true
          preferred_ip_protocol: ip4
          tls_config:
            insecure_skip_verify: false
      http_post_2xx:
        prober: http
        timeout: 10s
        http:
          method: POST
          headers:
            Content-Type: application/json
          body: '{}'
          valid_status_codes:
            - 200
            - 201
          preferred_ip_protocol: ip4
      tcp_connect:
        prober: tcp
        timeout: 10s
      icmp:
        prober: icmp
        timeout: 5s
        icmp:
          preferred_ip_protocol: ip4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: ahmedelbaz
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: blackbox-exporter
          image: prom/blackbox_exporter:v0.24.0
          args:
            - --config.file=/etc/blackbox_exporter/blackbox.yml
            - --web.listen-address=:9115
          ports:
            - containerPort: 9115
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox_exporter
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: ahmedelbaz
  labels:
    app: blackbox-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9115
      targetPort: 9115
      protocol: TCP
  selector:
    app: blackbox-exporter
