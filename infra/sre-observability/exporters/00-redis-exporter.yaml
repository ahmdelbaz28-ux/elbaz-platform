apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: ahmedelbaz
  labels:
    app: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.55.0
          args:
            - --redis.addr=redis://redis-master:6379
            - --redis.password=${REDIS_PASSWORD}
            - --web.listen-address=:9121
            - --check-keys=health,stats
          ports:
            - containerPort: 9121
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: redis-password
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: ahmedelbaz
  labels:
    app: redis-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9121
      targetPort: 9121
      protocol: TCP
  selector:
    app: redis-exporter
