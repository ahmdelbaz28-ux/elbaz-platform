    <!-- 🛡️ Elite Self-Healing: Catch ChunkLoadErrors early -->
    <script>
      window.addEventListener('error', function(e) {
        var msg = (e.message || "").toLowerCase();
        var isChunkError = msg.indexOf('chunk') > -1 || msg.indexOf('loading') > -1;
        if (isChunkError && typeof window.__nukeAndReload === 'function') {
          console.error('[Self-Healing] Asset failed to load. Triggering recovery...');
          window.__nukeAndReload('asset_load_failure', 'automatic recovery');
        }
      }, true);
    </script>

    <!-- Google Identity Services — loaded only when needed by auth pages via window.__loadGsi() -->
    <!-- This avoids a 40-60ms penalty on every non-auth page load -->
    <script>
      // Expose a lazy loader so auth pages can trigger it on demand
      window.__loadGsi = function() {
        if (document.querySelector('script[src*="accounts.google.com"]')) return;
        var s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.async = true; s.defer = true;
        document.head.appendChild(s);
      };
    </script>

    <!-- Microsoft Clarity Analytics — GDPR-Compliant CDN Integration -->
    <script type="text/javascript">

          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window,document,"clarity","script","3311349506496452");
    </script>

    <!-- 🛡️ Elite Cache Suppression: Force browser to check for new index.html on every load -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- CSP is enforced via HTTP header in boot.ts (not meta tag — avoids double-policy conflicts) -->
    <link rel="preload" as="image" href="hero-main.webp" type="image/webp" />
  </head>
  <body>
    <!-- ⚠️ CRITICAL: Cache-nuke MUST run first — before React and Service Worker.
         Detects version changes, clears stale caches, and force-reloads.
         Prevents white screen after every deployment.
         The ?v=%%CACHE_BUST%% placeholder is replaced at build time by buildIdPlugin
         to bust Cloudflare/CDN caches on every deploy. -->
    <script src="cache-nuke.js?v=%%CACHE_BUST%%"></script>
    <!-- Early RTL detection to prevent FOUC (external file to satisfy CSP script-src) -->
    <script src="rtl-detect.js?v=%%CACHE_BUST%%"></script>
    <div id="root"></div>
    <!-- 🚀 Elite: Cache-busting the main entry point to ensure JS updates propagate instantly -->
    <script type="module" src="src/main.tsx?v=%%CACHE_BUST%%"></script>
  </body>
